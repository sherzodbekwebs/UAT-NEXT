name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build

    - name: 📂 Sync files to cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./out/
        server-dir: ./
        # 🚀 XATOLARNI OLDINI OLISH UCHUN QO'SHIMCHA SOZLAMALAR:
        timeout: 900000 # 15 daqiqa (hosting sekin bo'lsa ham ulgurishi uchun)
        state-name: .ftp-deploy-sync-state.json # Faqat o'zgargan fayllarni yuklaydi (tezlik uchun)
        log-level: verbose # Nima bo'layotganini aniq ko'rish uchun